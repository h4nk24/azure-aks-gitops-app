apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: azure-aks-gitops-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/h4nk24/azure-aks-gitops-app.git
    targetRevision: main
    path: deploy/overlays/lab
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true