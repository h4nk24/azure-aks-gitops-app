apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-gitops-app
  namespace: demo
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: azure-gitops-app
  template:
    metadata:
      labels:
        app: azure-gitops-app
    spec:
      nodeSelector:
        workload: general
      containers:
        - name: app
          image: APP_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: initial
            - name: APP_ENV
              value: lab
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10